<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatLab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-soft: #4f46e5; --bg-app: #f8fafc; }
        body { background-color: var(--bg-app); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background: #1e293b; color: white; min-height: 100vh; padding-top: 20px; }
        .card-dashboard { border-radius: 16px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-header-custom { background-color: #ffffff; border-bottom: 1px solid #e1dfdd; padding: 15px 20px; border-radius: 16px 16px 0 0; }
        .slicer-box { background: white; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .slicer-label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .btn-add { background: var(--primary-soft); color: white; border-radius: 8px; transition: 0.3s; font-weight: 600; }
        .btn-add:hover { background: #4338ca; color: white; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 sidebar shadow-lg">
            <h4 class="px-4 fw-bold mb-4 text-indigo-400"> StatLab</h4>
            <ul class="nav flex-column px-2">
                <li class="nav-item mb-2">
                    <a class="nav-link text-white bg-secondary bg-opacity-25 rounded" href="{% url 'index' %}">📊 Construtor</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white-50" href="/admin/" target="_blank">⚙️ Configurações</a>
                </li>
            </ul>
        </nav>

        <main class="col-md-10 py-5 px-5">
            <div class="mb-5">
                <h2 class="fw-bold text-dark">Workspace de Avaliações</h2>
                <p class="text-muted">Configure sua prova e gere o conteúdo automaticamente.</p>
            </div>

            <form action="{% url 'gerar_provas' %}" method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-4">
                        <div class="slicer-box">
                            <label class="slicer-label">Professor</label>
                            <input type="text" name="professor" class="form-control form-control-sm" value="Eduardo Pontes">
                        </div>
                        <div class="slicer-box">
                            <label class="slicer-label">Período</label>
                            <input type="text" name="periodo" class="form-control form-control-sm" value="2026.1">
                        </div>
                        <div class="slicer-box">
                            <label class="slicer-label">Nível de Escolaridade</label>
                            <select id="nivel" name="nivel" class="form-select form-select-sm" onchange="filtrarCursos()" required>
                                <option value="">Selecione...</option>
                                <option value="fundamental">Ensino Fundamental</option>
                                <option value="medio">Ensino Médio</option>
                                <option value="superior">Ensino Superior</option>
                            </select>
                        </div>
                        <div class="slicer-box">
                            <label class="slicer-label">Contexto Alvo</label>
                            <select id="curso" name="curso" class="form-select form-select-sm" disabled required>
                                <option value="">Aguardando nível...</option>
                            </select>
                        </div>
                    </div>

                    <div class="col-md-8">
                        <div class="card card-dashboard">
                            <div class="card-header-custom d-flex justify-content-between align-items-center">
                                <h6 class="mb-0 fw-bold text-primary">Estrutura do Documento</h6>
                                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="adicionarBloco()">+ Questão</button>
                            </div>
                            <div class="card-body p-4" id="area-blocos-lego">
                                </div>
                            <div class="card-footer bg-white border-0 p-4">
                                <button type="submit" class="btn btn-success btn-lg w-100 py-3 fw-bold">GERAR PDF E GABARITO</button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </main>
    </div>
</div>

<script>
    const cursosData = [
        {% for c in cursos %}
        { id: "{{ c.id }}", nome: "{{ c.nome }}", nivel: "{{ c.nivel }}" },
        {% endfor %}
    ];

    function filtrarCursos() {
        const nivelSelect = document.getElementById('nivel');
        const cursoSelect = document.getElementById('curso');
        const nivelSelecionado = nivelSelect.value;
        cursoSelect.innerHTML = '<option value="">Selecione...</option>';
        if (nivelSelecionado) {
            cursoSelect.disabled = false;
            const cursosFiltrados = cursosData.filter(c => c.nivel === nivelSelecionado);
            cursosFiltrados.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                option.textContent = c.nome;
                cursoSelect.appendChild(option);
            });
        } else {
            cursoSelect.disabled = true;
        }
    }

    let contadorQuestoes = 0;
    function adicionarBloco() {
        contadorQuestoes++;
        const areaBlocos = document.getElementById('area-blocos-lego');
        const blocoHTML = `
            <div class="p-3 mb-3 border rounded bg-light" id="bloco-${contadorQuestoes}">
                <div class="d-flex justify-content-between mb-2">
                    <strong class="text-secondary small">QUESTÃO ${contadorQuestoes}</strong>
                    <button type="button" class="btn-close btn-sm" onclick="removerBloco(${contadorQuestoes})"></button>
                </div>
                <div class="row g-2">
                    <div class="col-md-6">
                        <select name="bloco_topico[]" class="form-select form-select-sm" required>
                            <option value="">Tópico...</option>
                            {% for t in topicos %}
                                <option value="{{ t.id }}">{{ t.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-2">
                        <input type="number" name="bloco_qtd_itens[]" class="form-control form-control-sm" placeholder="Itens" value="0">
                    </div>
                    <div class="col-md-4">
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="formato_${contadorQuestoes}" id="a_${contadorQuestoes}" value="aberta" checked>
                            <label class="btn btn-outline-secondary btn-sm" for="a_${contadorQuestoes}">Aberta</label>
                            <input type="radio" class="btn-check" name="formato_${contadorQuestoes}" id="m_${contadorQuestoes}" value="multipla">
                            <label class="btn btn-outline-secondary btn-sm" for="m_${contadorQuestoes}">Múltipla</label>
                        </div>
                        <input type="hidden" name="bloco_formato[]" id="hidden_${contadorQuestoes}" value="aberta">
                    </div>
                </div>
            </div>
        `;
        areaBlocos.insertAdjacentHTML('beforeend', blocoHTML);
        document.querySelectorAll(`input[name="formato_${contadorQuestoes}"]`).forEach(r => {
            r.onchange = (e) => document.getElementById(`hidden_${contadorQuestoes}`).value = e.target.value;
        });
    }

    function removerBloco(id) { document.getElementById(`bloco-${id}`).remove(); }
    window.onload = adicionarBloco;
</script>
</body>
</html>
