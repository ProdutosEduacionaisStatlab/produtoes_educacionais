<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatLab IA - Gerador de Avaliações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}">✨ StatLab IA</a>
            <div class="d-flex">
                <a href="/admin/" class="btn btn-outline-light btn-sm" target="_blank">⚙️ Painel Admin</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0 rounded-3">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0 fw-bold">Configuração da Avaliação (IA)</h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <form action="{% url 'gerar_provas' %}" method="POST">
                            {% csrf_token %}
                            
                            <h5 class="mb-3 text-primary">1. Cabeçalho</h5>
                            <div class="row mb-4">
                                <div class="col-md-12 mb-2">
                                    <label class="form-label"><b>Nome do Professor:</b></label>
                                    <input type="text" name="professor" class="form-control bg-light" value="Eduardo Pontes">
                                </div>
                                <div class="col-md-6 mb-2">
                                    <label class="form-label"><b>Período/Semestre:</b></label>
                                    <input type="text" name="periodo" class="form-control bg-light" value="2026.1">
                                </div>
                                <div class="col-md-6 mb-2">
                                    <label class="form-label"><b>Data da Prova:</b></label>
                                    <input type="date" name="data_prova" class="form-control" required>
                                </div>
                            </div>

                            <h5 class="mb-3 text-primary border-top pt-3">2. Contexto (Inteligência Artificial)</h5>
                            <div class="mb-3">
                                <label class="form-label"><b>Selecione o Curso (Público-Alvo):</b></label>
                                <select name="curso" class="form-control border-primary" required>
                                    <option value="">-- Escolha um curso --</option>
                                    {% for c in cursos %}
                                        <option value="{{ c.id }}">{{ c.nome }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label"><b>Selecione os Tópicos Estatísticos Base:</b></label>
                                <select name="topicos" class="form-control border-primary shadow-sm" multiple style="height: 120px;" required>
                                    {% for t in topicos %}
                                        <option value="{{ t.id }}">{{ t.nome }}</option>
                                    {% endfor %}
                                </select>
                                <small class="text-muted">Segure Ctrl (ou Cmd) para selecionar vários tópicos.</small>
                            </div>

                            <h5 class="mb-3 text-primary border-top pt-3">3. Configuração de Geração</h5>
                            <div class="row mb-4">
                                <div class="col-md-6 mb-2">
                                    <label class="form-label"><b>Número de Questões a Sortear:</b></label>
                                    <input type="number" name="num_questoes" class="form-control border-success" value="3" min="1" required>
                                </div>
                                <div class="col-md-6 mb-2">
                                    <label class="form-label"><b>Número de Versões Diferentes:</b></label>
                                    <input type="number" name="num_versoes" class="form-control border-success" value="1" min="1" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 shadow fw-bold">✨ Gerar Avaliação com IA</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
