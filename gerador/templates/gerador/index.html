<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatLab IA - Construtor de Avaliações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}">✨ StatLab IA</a>
            <div class="d-flex">
                <a href="/admin/" class="btn btn-outline-light btn-sm" target="_blank">⚙️ Painel Admin</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-9"> <div class="card shadow border-0 rounded-3">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0 fw-bold">Construtor de Avaliações (Modo Lego)</h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <form action="{% url 'gerar_provas' %}" method="POST">
                            {% csrf_token %}
                            
                            <h5 class="mb-3 text-primary">1. Cabeçalho</h5>
                            <div class="row mb-4">
                                <div class="col-md-12 mb-2">
                                    <label class="form-label"><b>Nome do Professor:</b></label>
                                    <input type="text" name="professor" class="form-control bg-light" value="Eduardo Pontes">
                                </div>
                                <div class="col-md-4 mb-2">
                                    <label class="form-label"><b>Período/Semestre:</b></label>
                                    <input type="text" name="periodo" class="form-control bg-light" value="2026.1">
                                </div>
                                <div class="col-md-4 mb-2">
                                    <label class="form-label"><b>Data da Prova:</b></label>
                                    <input type="date" name="data_prova" class="form-control" required>
                                </div>
                                <div class="col-md-4 mb-2">
                                    <label class="form-label"><b>Versões Diferentes:</b></label>
                                    <input type="number" name="num_versoes" class="form-control border-success" value="1" min="1" required>
                                </div>
                            </div>

                            <h5 class="mb-3 text-primary border-top pt-3">2. Contexto (Inteligência Artificial)</h5>
                            <div class="mb-4">
                                <label class="form-label"><b>Selecione o Curso (Público-Alvo):</b></label>
                                <select name="curso" class="form-control border-primary" required>
                                    <option value="">-- Escolha um curso --</option>
                                    {% for c in cursos %}
                                        <option value="{{ c.id }}">{{ c.nome }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <h5 class="mb-3 text-primary border-top pt-3 d-flex justify-content-between align-items-center">
                                3. Construtor da Prova
                                <button type="button" class="btn btn-sm btn-success fw-bold shadow-sm" onclick="adicionarBloco()">
                                    + Adicionar Questão
                                </button>
                            </h5>

                            <div id="area-blocos-lego" class="mb-4">
                                </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 shadow fw-bold mt-2">✨ Gerar Avaliação Modular</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let contadorQuestoes = 0;

        function adicionarBloco() {
            contadorQuestoes++;
            const areaBlocos = document.getElementById('area-blocos-lego');
            
            const blocoHTML = `
                <div class="card border-primary mb-3 shadow-sm" id="bloco-${contadorQuestoes}">
                    <div class="card-header bg-primary text-white d-flex justify-content-between py-2">
                        <strong>Questão ${contadorQuestoes}</strong>
                        <button type="button" class="btn btn-sm btn-danger py-0" onclick="removerBloco(${contadorQuestoes})">X</button>
                    </div>
                    <div class="card-body bg-light">
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <label class="form-label small fw-bold">Tópico Base:</label>
                                <select name="bloco_topico[]" class="form-select border-primary" required>
                                    <option value="">-- Escolha --</option>
                                    {% for t in topicos %}
                                        <option value="{{ t.id }}">{{ t.nome }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-3 mb-2">
                                <label class="form-label small fw-bold">Nº de Subitens (a,b,c):</label>
                                <input type="number" name="bloco_qtd_itens[]" class="form-control" value="0" min="0" max="26" title="Deixe 0 para questão direta">
                            </div>
                            <div class="col-md-3 mb-2">
                                <label class="form-label small fw-bold">Formato:</label>
                                <select name="bloco_formato[]" class="form-select" required>
                                    <option value="aberta">Aberta</option>
                                    <option value="multipla">Múltipla Escolha</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            areaBlocos.insertAdjacentHTML('beforeend', blocoHTML);
        }

        function removerBloco(id) {
            const bloco = document.getElementById(`bloco-${id}`);
            if (bloco) {
                bloco.remove();
            }
        }

        // Já cria o primeiro bloco automaticamente ao abrir a página
        window.onload = function() {
            adicionarBloco();
        };
    </script>
</body>
</html>
